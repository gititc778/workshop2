apiVersion: v1
kind: Pod
metadata:
  name: hostpath-demo
spec:
  containers:
  - name: app
    image: busybox
    command: ["/bin/sh", "-c"]
    args:
      - echo "Logging from pod" >> /data/log.txt && sleep 3600
    volumeMounts:
    - name: host-volume
      mountPath: /data

  volumes:
  - name: host-volume
    hostPath:
      path: /tmp/k8s-logs
      type: DirectoryOrCreate
