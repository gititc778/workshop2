apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx-node-anti-affinity-preferred
spec:
  replicas: 2
  selector:
    matchLabels:
      app: nginx
  template:
    metadata:
      labels:
        app: nginx
    spec:
      affinity:
        nodeAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 1
            preference:
              matchExpressions:
              - key: vmtype
                operator: NotIn
                values:
                - highmem
      containers:
      - name: nginx
        image: nginx
        ports:
        - containerPort: 80