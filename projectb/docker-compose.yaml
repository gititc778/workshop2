version: "3.8"

services:
  app1:
    build:
      context: ./app1
    ports:
      - "5001:5000"
    networks:
      - mynet
    volumes:
      - app1_data:/app/data

  app2:
    build:
      context: ./app2
    ports:
      - "5002:5000"
    networks:
      - mynet
    volumes:
      - app2_data:/app/data

networks:
  mynet:

volumes:
  app1_data:
  app2_data: